<svg width="350" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rgbFlow" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#ff0055" />
      <stop offset="25%" stop-color="#ffaa00" />
      <stop offset="50%" stop-color="#00ffaa" />
      <stop offset="75%" stop-color="#00aaff" />
      <stop offset="100%" stop-color="#aa00ff" />
      <!-- This animate tag makes the gradient slide slowly to the left -->
      <animate attributeName="x1" values="0%;-100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="200%;100%" dur="4s" repeatCount="indefinite" />
    </linearGradient>
  </defs>
  
  <!-- Transparent background so it looks good in Dark/Light mode -->
  <rect width="100%" height="100%" fill="transparent"/>
  
  <text x="10" y="20" font-family="'Courier New', Courier, monospace" font-size="18" font-weight="bold" fill="url(#rgbFlow)" xml:space="preserve">
    <tspan x="10" dy="1.2em">   ___   ___  ___   ___  _    </tspan>
    <tspan x="10" dy="1.2em">  / _ \ |_ _|| _ ) | __|| |   </tspan>
    <tspan x="10" dy="1.2em"> |  _  | | | | _ \ | _| | |__ </tspan>
    <tspan x="10" dy="1.2em"> |_| |_||___||___/ |___||____|</tspan>
  </text>
</svg>
